<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ DigitalID — Fingerprint Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1e2a3a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { background: #fff; border-bottom: 1px solid #e8ecf1; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.header h1 { font-size: 16px; color: #4a6cf7; white-space: nowrap; }
.header .subtitle { font-size: 12px; color: #6b7b8d; }

.nav { display: flex; gap: 0; background: #fff; border-bottom: 1px solid #e8ecf1; flex-shrink: 0; overflow-x: auto; padding: 0 12px; }
.nav-group { display: flex; gap: 0; }
.nav-group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #a0aec0; padding: 8px 12px 0; letter-spacing: 0.5px; white-space: nowrap; align-self: center; }
.nav button { padding: 10px 14px; border: none; background: none; font-size: 12px; color: #6b7b8d; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
.nav button:hover { color: #1e2a3a; background: #f7f8fc; }
.nav button.active { color: #4a6cf7; border-bottom-color: #4a6cf7; font-weight: 600; }
.nav button.cat-comprehensive { color: #4a6cf7; }
.nav button.cat-specific { color: #f59e0b; }
.nav button.cat-bot { color: #ef4444; }

.content { flex: 1; position: relative; }
.content iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #6b7b8d; }
.loading .spinner { font-size: 32px; margin-bottom: 8px; animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.info-bar { background: #eef2ff; padding: 6px 20px; font-size: 11px; color: #4a6cf7; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.info-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

.quick-info { display: flex; gap: 16px; margin-left: auto; font-size: 11px; color: #6b7b8d; }
.quick-info span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ DigitalID</h1>
  <span class="subtitle">Fingerprint Verification Dashboard</span>
</div>

<div class="info-bar">
  <span class="dot"></span>
  <span>Profile browser detected</span>
  <div class="quick-info">
    <span>🌐 <span id="q-ua"></span></span>
    <span>🖥️ <span id="q-screen"></span></span>
    <span>⚙️ <span id="q-cpu"></span> cores</span>
    <span>💾 <span id="q-ram"></span> GB</span>
  </div>
</div>

<div class="nav" id="nav">
  <!-- Comprehensive -->
  <span class="nav-group-label">📊 Comprehensive</span>
  <button class="active" data-url="https://browserleaks.com" data-name="BrowserLeaks">BrowserLeaks</button>
  <button data-url="https://abrahamjuliot.github.io/creepjs/" data-name="CreepJS">CreepJS</button>
  <button data-url="https://fingerprintjs.github.io/fingerprintjs/" data-name="FingerprintJS">FingerprintJS</button>

  <!-- Specific checks -->
  <span class="nav-group-label">🔍 Specific</span>
  <button data-url="https://browserleaks.com/webrtc" data-name="WebRTC Leak">WebRTC</button>
  <button data-url="https://browserleaks.com/canvas" data-name="Canvas">Canvas</button>
  <button data-url="https://browserleaks.com/webgl" data-name="WebGL">WebGL</button>
  <button data-url="https://browserleaks.com/javascript" data-name="JS / TZ / CPU">JS Info</button>
  <button data-url="https://browserleaks.com/fonts" data-name="Fonts">Fonts</button>
  <button data-url="https://ipleak.net" data-name="IP Leak">IP Leak</button>
  <button data-url="https://whatismybrowser.com" data-name="UA / OS">UA / OS</button>

  <!-- Bot detection -->
  <span class="nav-group-label">🤖 Bot Detection</span>
  <button data-url="https://bot.sannysoft.com" data-name="Sannysoft">Sannysoft</button>
  <button data-url="https://pixelscan.net" data-name="PixelScan">PixelScan</button>
</div>

<div class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner">⏳</div>
    <div>Loading BrowserLeaks...</div>
  </div>
  <iframe id="frame" src="https://browserleaks.com" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" referrerpolicy="no-referrer"></iframe>
</div>

<script>
// Quick info bar
document.getElementById('q-ua').textContent = navigator.userAgent.match(/(Chrome|Firefox)\/[\d.]+/)?.[0] || navigator.userAgent.substring(0, 30);
document.getElementById('q-screen').textContent = screen.width + 'x' + screen.height;
document.getElementById('q-cpu').textContent = navigator.hardwareConcurrency || '?';
document.getElementById('q-ram').textContent = navigator.deviceMemory || '?';

// Tab navigation
const buttons = document.querySelectorAll('.nav button');
const frame = document.getElementById('frame');
const loading = document.getElementById('loading');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const url = btn.dataset.url;
    const name = btn.dataset.name;
    loading.style.display = 'block';
    loading.querySelector('div:last-child').textContent = 'Loading ' + name + '...';
    frame.src = url;
  });
});

frame.addEventListener('load', () => {
  loading.style.display = 'none';
});

// Hide loading after timeout (some sites block iframe load event)
setTimeout(() => { loading.style.display = 'none'; }, 5000);
</script>

</body>
</html>
